# Terraform static checks for infra/ (Task 2).
# Workflow syntax (on, paths): https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
# setup-terraform: https://github.com/hashicorp/setup-terraform#usage
# terraform fmt: https://developer.hashicorp.com/terraform/cli/commands/fmt
# terraform init -backend=false: https://developer.hashicorp.com/terraform/cli/commands/init
# terraform validate: https://developer.hashicorp.com/terraform/cli/commands/validate
# setup-tflint: https://github.com/terraform-linters/setup-tflint/blob/v4/README.md
# checkov-action: https://github.com/bridgecrewio/checkov-action/blob/master/README.md

name: Terraform CI

# Security (Task 2): no repo secrets referenced; minimal permissions below.
# Fork PRs receive read-only token appropriate for checkout + static scans only.
# Pinning third-party Actions to immutable SHAs is recommended for supply-chain rigor.

concurrency:
  group: terraform-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-ci.yml"
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: infra
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"
          terraform_wrapper: false

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init (providers only)
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          # Pinned release (supply chain / reproducibility) — https://github.com/terraform-linters/tflint/releases
          tflint_version: v0.62.0

      - name: Init TFLint plugins
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint --format compact

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          quiet: true

  terraform-plan:
    needs: static-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.9"
          terraform_wrapper: false

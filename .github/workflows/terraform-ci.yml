# Terraform static checks for infra/ (Task 2).
# Workflow syntax (on, paths): https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
# setup-terraform: https://github.com/hashicorp/setup-terraform#usage
# terraform fmt: https://developer.hashicorp.com/terraform/cli/commands/fmt
# terraform init -backend=false: https://developer.hashicorp.com/terraform/cli/commands/init
# terraform validate: https://developer.hashicorp.com/terraform/cli/commands/validate
# setup-tflint: https://github.com/terraform-linters/setup-tflint/blob/v4/README.md
# checkov-action: https://github.com/bridgecrewio/checkov-action/blob/master/README.md

name: Terraform CI

# Security (Task 2): no repo secrets referenced; minimal permissions below.
# Fork PRs receive read-only token appropriate for checkout + static scans only.
# Pinning third-party Actions to immutable SHAs is recommended for supply-chain rigor.

concurrency:
  group: terraform-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-ci.yml"
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: infra
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"
          terraform_wrapper: false

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init (providers only)
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          # Pinned release (supply chain / reproducibility) — https://github.com/terraform-linters/tflint/releases
          tflint_version: v0.62.0

      - name: Init TFLint plugins
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint --format compact

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          quiet: true

  terraform-plan:
    needs: static-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.9"
          terraform_wrapper: false

      - name: Terraform Init (providers only)
        run: terraform -chdir=infra init -backend=false -input=false

      - name: Validate plan input boundary (vm_admin_ssh_public_key)
        shell: bash
        run: |
          set -euo pipefail
          fail() {
            echo "$1" >&2
            exit 1
          }

          [[ -n "${TF_VAR_vm_admin_ssh_public_key:-}" ]] || fail "Missing required TF_VAR_vm_admin_ssh_public_key for terraform plan."
          [[ "$TF_VAR_vm_admin_ssh_public_key" != *"PRIVATE KEY"* ]] || fail "TF_VAR_vm_admin_ssh_public_key must be a public key, not private key material."
          [[ "$TF_VAR_vm_admin_ssh_public_key" =~ ^(ssh-rsa|ssh-ed25519)[[:space:]][A-Za-z0-9+/]+={0,3}([[:space:]].+)?$ ]] || fail "TF_VAR_vm_admin_ssh_public_key must be a single-line OpenSSH public key (ssh-rsa or ssh-ed25519)."
        env:
          TF_VAR_vm_admin_ssh_public_key: ${{ vars.TF_VAR_VM_ADMIN_SSH_PUBLIC_KEY }}

      - name: Terraform Plan (artifact text output)
        run: terraform -chdir=infra plan -input=false -refresh=false -lock=false -no-color > task8-plan.txt
        env:
          TF_VAR_vm_admin_ssh_public_key: ${{ vars.TF_VAR_VM_ADMIN_SSH_PUBLIC_KEY }}

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan
          path: task8-plan.txt
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: false

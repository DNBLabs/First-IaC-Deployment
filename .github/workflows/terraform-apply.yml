# Task 9.1 skeleton: protected main apply workflow shell.
# Workflow syntax (branches, permissions, jobs):
# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
# Environments and deployment protection rules:
# https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment

name: Terraform Apply

on:
  push:
    branches:
      - main

concurrency:
  group: terraform-apply-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  terraform-apply:
    name: terraform-apply
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      AZURE_CORE_OUTPUT: none
      TF_IN_AUTOMATION: true
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate Azure OIDC input boundary
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          test -n "$AZURE_CLIENT_ID" || { echo "::error::AZURE_CLIENT_ID is required for azure/login OIDC authentication."; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "::error::AZURE_TENANT_ID is required for azure/login OIDC authentication."; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "::error::AZURE_SUBSCRIPTION_ID is required for azure/login OIDC authentication."; exit 1; }

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform -chdir=infra init -input=false -no-color

      - name: Terraform Apply
        run: terraform -chdir=infra apply -auto-approve -input=false -no-color
